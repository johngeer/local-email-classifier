version: '3'

tasks:
  train:
    desc: Fit a fresh model over every confirmed label (release), logging to output/
    cmds:
      - task: build
      - task: run
        vars: {CLI_ARGS: train}

  classify:
    desc: Classify in-scope new mail — the post-new hook path (release), logging to output/
    cmds:
      - task: run
        vars: {CLI_ARGS: classify}

  eval:
    desc: Time-held-out confusion-matrix sanity check (release), logging to output/. Pass --cutoff via CLI_ARGS.
    cmds:
      - task: build
      - task: run
        vars: {CLI_ARGS: 'eval {{.CLI_ARGS}}'}

  test:
    desc: Run the test suite, teeing output to a timestamped file in output/
    cmds:
      - mkdir -p output
      - |
        log="output/$(date +%Y%m%d-%H%M%S)_test.log"
        echo "========================================================"
        echo "  Test output saved to: $log"
        echo "========================================================"
        cargo test 2>&1 | tee "$log"
        echo "========================================================"
        echo "  Test output saved to: $log"
        echo "========================================================"

  build:
    desc: Build the project in release mode
    cmds:
      - cargo build --release

  run:
    desc: Run the classifier, teeing output to a timestamped file in output/
    cmds:
      - mkdir -p output
      - cargo run --release -- {{.CLI_ARGS}} 2>&1 | tee "output/run-$(date +%Y%m%d-%H%M%S).log"

  clean-cache:
    desc: Clear the persistent embedding cache
    cmds:
      - rm -rf cache/


